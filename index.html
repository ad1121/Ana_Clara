<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Maker Pro - Layout Desktop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Proporção A4 vertical (1 / 1.4142) */
        .a4-preview-item {
            aspect-ratio: 210 / 297;
            background: white;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Esconde setas padrão do input number para um look cleaner, mas mantém funcional */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div class="max-w-[1600px] mx-auto p-4 md:p-8">
        <header class="mb-8 border-b border-slate-200 pb-4">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">POSTER<span class="text-blue-600">LAB</span></h1>
            <p class="text-slate-500 text-sm">Divisor de imagens em escala real para impressão A4.</p>
        </header>

        <div class="flex flex-col-reverse lg:flex-row gap-8">
            
            <main class="flex-1">
                <div class="bg-slate-200/50 rounded-3xl p-6 border-2 border-dashed border-slate-300 min-h-[70vh] flex items-center justify-center">
                    <div id="emptyState" class="text-center text-slate-400">
                        <div class="text-6xl mb-4">🖼️</div>
                        <p class="font-medium">Sua pré-visualização aparecerá aqui após o upload</p>
                    </div>
                    <div id="preview" class="grid gap-3 w-full max-w-5xl"></div>
                </div>
            </main>

            <aside class="w-full lg:w-80 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200 sticky top-8">
                    <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <span>⚙️</span> Configurações
                    </h2>

                    <div class="mb-8">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">1. Imagem Base</label>
                        <div class="relative">
                            <input type="file" id="upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="border-2 border-blue-100 bg-blue-50/50 rounded-xl p-4 text-center text-blue-700 text-sm font-semibold hover:bg-blue-100 transition">
                                Selecionar Arquivo
                            </div>
                        </div>
                    </div>

                    <div class="mb-8">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-4">2. Ajustar Grade</label>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <span class="text-sm font-medium text-slate-600">Colunas</span>
                                <input type="number" id="cols" value="2" min="1" max="12" class="w-16 text-center font-bold bg-white border border-slate-200 rounded-lg p-1 text-blue-600 focus:ring-2 focus:ring-blue-400 outline-none">
                            </div>
                            <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <span class="text-sm font-medium text-slate-600">Linhas</span>
                                <input type="number" id="rows" value="2" min="1" max="12" class="w-16 text-center font-bold bg-white border border-slate-200 rounded-lg p-1 text-blue-600 focus:ring-2 focus:ring-blue-400 outline-none">
                            </div>
                        </div>
                    </div>

                    <button id="downloadBtn" disabled class="w-full bg-slate-800 hover:bg-black disabled:bg-slate-200 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-slate-200">
                        <span>📥</span> Baixar Tudo
                    </button>
                    
                    <div class="mt-6 pt-6 border-t border-slate-100">
                        <div class="flex items-center gap-2 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            Modo Alta Resolução Ativo
                        </div>
                    </div>
                </div>
            </aside>

        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const colsInput = document.getElementById('cols');
        const rowsInput = document.getElementById('rows');
        const preview = document.getElementById('preview');
        const emptyState = document.getElementById('emptyState');
        const downloadBtn = document.getElementById('downloadBtn');

        let imgOriginal = null;
        let partesGeradas = [];

        // Atualização em tempo real
        [colsInput, rowsInput].forEach(input => {
            input.oninput = () => { if(imgOriginal) processarImagem(); };
        });

        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                imgOriginal = new Image();
                imgOriginal.onload = () => {
                    emptyState.style.display = 'none';
                    processarImagem();
                };
                imgOriginal.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function processarImagem() {
            const cols = Math.max(1, parseInt(colsInput.value) || 1);
            const rows = Math.max(1, parseInt(rowsInput.value) || 1);
            
            preview.innerHTML = '';
            partesGeradas = [];
            preview.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const pW = imgOriginal.width / cols;
            const pH = imgOriginal.height / rows;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'a4-preview-item';
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = pW;
                    canvas.height = pH;

                    ctx.drawImage(imgOriginal, c * pW, r * pH, pW, pH, 0, 0, pW, pH);
                    
                    wrapper.appendChild(canvas);
                    preview.appendChild(wrapper);
                    
                    partesGeradas.push({
                        data: canvas.toDataURL('image/png', 1.0),
                        name: `parte_${r+1}_${c+1}.png`
                    });
                }
            }
            downloadBtn.disabled = false;
        }

        downloadBtn.onclick = () => {
            partesGeradas.forEach((img, i) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = img.data;
                    a.download = img.name;
                    a.click();
                }, i * 350); // Delay para garantir o download de múltiplos arquivos
            });
        };
    </script>
</body>
</html>
