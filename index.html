<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Precision - Gemini Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo Estilo Gemini */
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f1f5f9;
        }
        
        .a4-preview-item {
            aspect-ratio: 210 / 297;
            background: #ffffff;
            border: 2px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .a4-preview-item:hover {
            transform: scale(1.02);
            border-color: #6366f1;
        }

        canvas { width: 100%; height: 100%; display: block; }

        /* Botão de Upload Estilizado (Grifado) */
        .upload-wrapper {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #4f46e5, #9333ea, #db2777);
            padding: 2px;
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .upload-wrapper:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }

        .upload-content {
            background: #0f172a;
            padding: 12px;
            border-radius: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="number"]::-webkit-outer-spin-button, 
        input[type="number"]::-webkit-inner-spin-button { 
            opacity: 1; 
            height: 30px;
        }
    </style>
</head>
<body class="min-h-screen font-sans">

    <div class="max-w-[1600px] mx-auto p-6 md:p-10">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                    POSTER<span class="text-white">AI</span>
                </h1>
                <p id="suggestionText" class="text-sm text-slate-400 mt-1 font-medium">Pronto para processar sua imagem em alta definição.</p>
            </div>
            
            <div class="bg-slate-800/50 p-1 rounded-2xl border border-slate-700 backdrop-blur-md flex">
                <button id="modeCover" onclick="setMode('cover')" class="px-6 py-2 text-xs font-bold rounded-xl transition-all bg-indigo-600 text-white shadow-lg">PREENCHER TUDO</button>
                <button id="modeContain" onclick="setMode('contain')" class="px-6 py-2 text-xs font-bold rounded-xl transition-all text-slate-400 hover:text-white">IMAGEM INTEIRA</button>
            </div>
        </header>

        <div class="flex flex-col-reverse lg:flex-row gap-10">
            
            <main class="flex-1">
                <div class="bg-slate-900/40 rounded-[2.5rem] p-6 md:p-12 border border-slate-800 backdrop-blur-sm min-h-[75vh] flex items-center justify-center">
                    <div id="preview" class="grid gap-4 w-full max-w-5xl">
                        <div class="col-span-full text-center py-20">
                            <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6">
                                <span class="text-4xl">✨</span>
                            </div>
                            <h2 class="text-xl font-bold text-slate-300">Nenhuma imagem carregada</h2>
                            <p class="text-slate-500 mt-2">Use o painel ao lado para começar seu projeto.</p>
                        </div>
                    </div>
                </div>
            </main>

            <aside class="w-full lg:w-96 space-y-6">
                <div class="bg-slate-900/80 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl sticky top-10 backdrop-blur-xl">
                    
                    <div class="mb-10">
                        <label class="block text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-4">Passo 1: Importar</label>
                        <div class="upload-wrapper">
                            <div class="upload-content">
                                <span class="text-white text-lg">📁</span>
                                <span class="text-white font-bold text-sm">ESCOLHER ARQUIVO</span>
                                <input type="file" id="upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4 mb-10">
                        <label class="block text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-4">Passo 2: Ajustar Grade</label>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                                <span class="block text-[9px] text-slate-500 font-bold mb-1">COLUNAS</span>
                                <input type="number" id="cols" value="2" min="1" max="12" class="w-full bg-transparent text-2xl font-black text-white outline-none">
                            </div>
                            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                                <span class="block text-[9px] text-slate-500 font-bold mb-1">LINHAS</span>
                                <input type="number" id="rows" value="2" min="1" max="12" class="w-full bg-transparent text-2xl font-black text-white outline-none">
                            </div>
                        </div>
                    </div>

                    <button id="downloadBtn" disabled class="w-full bg-white hover:bg-indigo-50 disabled:bg-slate-800 disabled:text-slate-600 text-slate-950 font-black py-5 rounded-2xl transition-all flex flex-col items-center gap-1 shadow-xl shadow-indigo-500/10">
                        <span class="text-base uppercase tracking-tight">Finalizar e Baixar</span>
                        <span class="text-[9px] font-bold opacity-40">QUALIDADE ULTRA HD (300 DPI)</span>
                    </button>

                    <div class="mt-8 text-center">
                        <p class="text-[10px] text-slate-500 leading-relaxed font-medium">
                            As imagens serão divididas respeitando milimetricamente o formato A4.
                        </p>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const colsInput = document.getElementById('cols');
        const rowsInput = document.getElementById('rows');
        const preview = document.getElementById('preview');
        const downloadBtn = document.getElementById('downloadBtn');
        const suggestionText = document.getElementById('suggestionText');
        
        let imgOriginal = null;
        let partesGeradas = [];
        let currentMode = 'cover';

        function setMode(mode) {
            currentMode = mode;
            const btnCover = document.getElementById('modeCover');
            const btnContain = document.getElementById('modeContain');
            
            if(mode === 'cover') {
                btnCover.className = "px-6 py-2 text-xs font-bold rounded-xl transition-all bg-indigo-600 text-white shadow-lg";
                btnContain.className = "px-6 py-2 text-xs font-bold rounded-xl transition-all text-slate-400 hover:text-white";
            } else {
                btnContain.className = "px-6 py-2 text-xs font-bold rounded-xl transition-all bg-indigo-600 text-white shadow-lg";
                btnCover.className = "px-6 py-2 text-xs font-bold rounded-xl transition-all text-slate-400 hover:text-white";
            }
            if(imgOriginal) processarImagem();
        }

        [colsInput, rowsInput].forEach(input => {
            input.oninput = () => { if(imgOriginal) processarImagem(); };
        });

        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgOriginal = new Image();
                imgOriginal.onload = () => {
                    sugerirFormato();
                    processarImagem();
                };
                imgOriginal.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function sugerirFormato() {
            const imgAspect = imgOriginal.width / imgOriginal.height;
            if (imgAspect > 1.2) { colsInput.value = 3; rowsInput.value = 2; suggestionText.innerText = "✨ Formato Lado a Lado sugerido"; }
            else if (imgAspect < 0.8) { colsInput.value = 2; rowsInput.value = 3; suggestionText.innerText = "✨ Formato Vertical sugerido"; }
            else { colsInput.value = 2; rowsInput.value = 2; suggestionText.innerText = "✨ Formato Quadrado sugerido"; }
        }

        function processarImagem() {
            const cols = parseInt(colsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            preview.innerHTML = '';
            partesGeradas = [];
            preview.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const posterAspect = (cols * 210) / (rows * 297);
            const imageAspect = imgOriginal.width / imgOriginal.height;

            let sW, sH, sX = 0, sY = 0;

            if (currentMode === 'cover') {
                if (imageAspect > posterAspect) {
                    sH = imgOriginal.height; sW = imgOriginal.height * posterAspect;
                    sX = (imgOriginal.width - sW) / 2;
                } else {
                    sW = imgOriginal.width; sH = imgOriginal.width / posterAspect;
                    sY = (imgOriginal.height - sH) / 2;
                }
            } else {
                if (imageAspect > posterAspect) {
                    sW = imgOriginal.width; sH = imgOriginal.width / posterAspect;
                    sY = (imgOriginal.height - sH) / 2;
                } else {
                    sH = imgOriginal.height; sW = imgOriginal.height * posterAspect;
                    sX = (imgOriginal.width - sW) / 2;
                }
            }

            const pieceW = sW / cols;
            const pieceH = sH / rows;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const wrap = document.createElement('div');
                    wrap.className = 'a4-preview-item';
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Alta definição para folha A4 em 300 DPI
                    canvas.width = 2480; 
                    canvas.height = 3508;

                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.drawImage(
                        imgOriginal, 
                        sX + (c * pieceW), sY + (r * pieceH), pieceW, pieceH, 
                        0, 0, canvas.width, canvas.height
                    );
                    
                    wrap.appendChild(canvas);
                    preview.appendChild(wrap);
                    
                    partesGeradas.push({
                        data: canvas.toDataURL('image/png', 1.0),
                        name: `poster_A4_R${r+1}_C${c+1}.png`
                    });
                }
            }
            downloadBtn.disabled = false;
        }

        downloadBtn.onclick = () => {
            partesGeradas.forEach((img, i) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = img.data; a.download = img.name; a.click();
                }, i * 400);
            });
        };
    </script>
</body>
</html>
